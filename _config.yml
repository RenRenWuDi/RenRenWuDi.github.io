# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 区块链编程
subtitle: 用代码读懂区块链 · 用文字记录成长
description: 区块链编程 - 专注区块链技术深度文章、Web3 开发实战、量化交易编程。用代码读懂区块链，用文字记录成长。
keywords: 区块链,区块链编程,Web3,智能合约,以太坊,DeFi,加密货币,量化交易
author: 区块链编程
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://renrenwudi.github.io
permalink: :year/:month/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render: robots.txt

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: 区块链基础
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: butterfly

# Deployment
deploy:
  type: git
  repo: https://github.com/RenRenWuDi/RenRenWuDi.github.io.git
  branch: gh-pages

# Sitemap
sitemap:
  path: sitemap.xml
  rel: false
  tags: true
  categories: true

# Search
search:
  path: search.xml
  field: post
  content: true
  format: html

# Google Analytics 4 - 替换为你的衡量 ID
GA4_ID: G-XXXXXXXXXX

# Google AdSense - 替换为你的发布商 ID
ADSENSE_ID: ca-pub-XXXXXXXXXXXXXXXX
